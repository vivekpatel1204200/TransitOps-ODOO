databases:
  - name: transitops-db
    plan: free
    databaseName: transitops
    user: transitops

services:
  - type: web
    name: transitops-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://transitops-frontend.onrender.com

  - type: web
    name: transitops-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://transitops-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
